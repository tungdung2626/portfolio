<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artworks - Nguyễn Tùng Dương</title>
    <link rel="stylesheet" href="loco.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
</head>
<body>
    <div id="minicircle"></div>
    <div id="main">
        <div id="nav">
            <a href="index.html">Nguyễn Tùng Dương</a>
            <div class="nav-links">
                <a href="index.html">TRANG CHỦ</a>
            </div>
        </div>

        <div class="gallery-grid" id="my-gallery">
            <a href="assets/anh1.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh1.jpg" alt="Tác phẩm 1">
                <div class="overlay">TỔNG HỢP TRANH VẼ</div>
            </a>
            <a href="assets/anh2.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">

            </a>
            <a href="assets/anh3.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh3.jpg" alt="Tác phẩm 3">
                <div class="overlay">Tác phẩm 3</div>
            </a>
            <a href="assets/anh4.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh4.jpg" alt="Tác phẩm 4">
                <div class="overlay">Tác phẩm 4</div>
            </a>
            <a href="assets/anh5.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh5.jpg" alt="Tác phẩm 5">
                <div class="overlay">Tác phẩm 5</div>
            </a>
            <a href="assets/anh6.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh6.jpg" alt="Tác phẩm 6">
                <div class="overlay">Tác phẩm 6</div>
            </a>
            <a href="assets/anh7.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh7.jpg" alt="Tác phẩm 7">
                <div class="overlay">Tác phẩm 7</div>
            </a>
            <a href="assets/anh8.jpg" data-pswp-width="1200" data-pswp-height="1600" class="grid-item">
                <img src="assets/anh8.jpg" alt="Tác phẩm 8">
                <div class="overlay">Tác phẩm 8</div>
            </a>
        </div>

        <div class="footer">
            <div class="footerleft"><div>2026 &copy;</div></div>
            <div class="footerright">
                <a href="https://www.facebook.com/jeeperrule" target="_blank">FACEBOOK</a>
                <a href="https://www.instagram.com/tungduong2626/" target="_blank">INSTAGRAM</a>
            </div>
        </div>

        <div style="display:none;">
            <div class="boundingelem"></div>
            <div id="time"></div>
            <div class="bottom"></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.min.js"></script>
    <script src="script.js"></script>
    
    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe-lightbox.esm.min.js';
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#my-gallery',
            children: 'a',
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.esm.min.js')
        });
        lightbox.init();
    </script>
</body>
</html>
